syntax = "proto3";

package worldbank.v1;

option go_package = "worldlens/ingest-service/internal/gen/worldbankpb";

// CountryDataService streams World Bank indicator data for a country.
service CountryDataService {
  // StreamCountryIndicators fetches one or more indicators for a country
  // and streams each data point back as it is retrieved from the World
  // Bank API, rather than waiting for the full response.
  rpc StreamCountryIndicators(IndicatorRequest) returns (stream IndicatorDataPoint);
}

message IndicatorRequest {
  // ISO 3166-1 alpha-2 or alpha-3 country code, e.g. "MM" for Myanmar.
  string country_code = 1;

  // World Bank indicator codes, e.g. "NY.GDP.MKTP.CD".
  repeated string indicator_codes = 2;

  // Inclusive year range. If both are 0, the World Bank API default range is used.
  int32 start_year = 3;
  int32 end_year = 4;
}

message IndicatorDataPoint {
  string country_code = 1;
  string country_name = 2;
  string indicator_code = 3;
  string indicator_name = 4;
  int32 year = 5;
  double value = 6;
  // World Bank data frequently has gaps; has_value distinguishes a real
  // 0.0 reading from a missing/null value for the year.
  bool has_value = 7;
}
